# Zone classification thresholds for AECT triage.
# GENERIC PLACEHOLDER values only.
# Real, firm-specific parameters are never committed (contractual IP separation).
#
# V4 (SDR-0003): der Composite-Aufwand-Score hat jetzt Range 1-9 (vorher 2-10);
# diese Zonen-Schwellen bleiben bewusst unveraendert. Eine Re-Kalibrierung nach
# der Golden-Remessung (V4-P4) ist moeglich.

zone:
  likely_win:
    # Qualifies as LIKELY_WIN if:
    # expected_benefit >= min AND composite_score <= max
    min_expected_benefit_eur: 50000.0
    max_composite_score: 4

  calculated_risk:
    # Qualifies as CALCULATED_RISK if:
    # expected_benefit >= min AND composite_score <= max
    # (and does not qualify as LIKELY_WIN)
    min_expected_benefit_eur: 5000.0
    max_composite_score: 7

  # Everything below calculated_risk thresholds -> MARGINAL_GAIN

handlungsdruck:
  # If handlungsdruck_score >= this threshold, zone is elevated by one step:
  # MARGINAL_GAIN -> CALCULATED_RISK, CALCULATED_RISK -> LIKELY_WIN
  # (LIKELY_WIN stays LIKELY_WIN — already at maximum)
  elevation_threshold: 4  # integer, 1-4 scale
