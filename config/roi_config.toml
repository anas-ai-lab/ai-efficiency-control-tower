# AECT ROI-Konfiguration — GENERISCHE PLATZHALTER
#
# IP-Trennung (vertraglich bedingt): KEINE echten Firmenwerte hier eintragen.
# Echte Stundensätze UND weitere Länder (no/gb/es/it/tr/ro/pl/eg/in ...) gehören
# ausschließlich in config/roi_config.local.toml (gitignored). Diese getrackte
# Datei enthält nur generische DACH-Platzhalter für de/at/ch.
#
# Keys MÜSSEN mit StrEnum-Values aus src/aect/domain/types.py übereinstimmen
# (lowercase — Mismatch = stiller ROI=0, TOML/StrEnum-Invariante):
#   Country:           de / at / ch (+ Platzhalter-Länder nur in local.toml)
#   EmployeeCategory:  junior / professional / consultant / senior / management
#   EvidenceLevel:     pure_estimate / similar_project / tested_piloted
#   AdoptionType:      voluntary / recommended_standard / fixed_process_step
#
# Config-Layering (V4, SDR-0003): existiert config/roi_config.local.toml, wird
# es DARÜBER gemerged (hourly_rates länderweise, andere Sections keyweise). Diese
# getrackte Datei bleibt der Platzhalter-Stand — das Repo läuft aus sich heraus.
#
# Jede [hourly_rates.<land>]-Section MUSS alle 5 Level tragen — fehlt ein Level,
# liefert der Lookup 0 → theoretisches Potenzial 0 → stiller Vorfilter-Fail.

[thresholds]
min_potential_eur        = 20000.0
min_hours_per_year       = 120.0
min_expected_benefit_eur = 5000.0

[hourly_rates.de]
junior       = 45.0
professional = 65.0
consultant   = 78.0
senior       = 90.0
management   = 120.0

[hourly_rates.at]
junior       = 42.0
professional = 60.0
consultant   = 72.0
senior       = 85.0
management   = 110.0

[hourly_rates.ch]
junior       = 55.0
professional = 80.0
consultant   = 95.0
senior       = 110.0
management   = 145.0

[effort_cost_points]
# Zwei Kostenpunkte (0-2) des Composite-Aufwand-Scores (V4, SDR-0003):
# +1 wenn Impl.-Kosten >= impl_cost_point_min_eur, +1 wenn Lizenzkosten/Jahr
# >= license_cost_point_min_eur. Generische Platzhalter — echte Schwellen ggf.
# in roi_config.local.toml.
impl_cost_point_min_eur    = 10000.0
license_cost_point_min_eur = 10000.0

[evidence_factors]
pure_estimate   = 0.40
similar_project = 0.55
tested_piloted  = 0.90

[adoption_factors]
voluntary            = 0.50
recommended_standard = 0.70
fixed_process_step   = 0.90
