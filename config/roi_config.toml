# AECT ROI-Konfiguration — GENERISCHE PLATZHALTER
#
# IP-Trennung (vertraglich bedingt): KEINE echten Firmenwerte hier eintragen.
# Echte Stundensätze UND weitere Länder (no/gb/es/it/tr/ro/pl/eg/in ...) gehören
# ausschließlich in config/roi_config.local.toml (gitignored). Diese getrackte
# Datei enthält nur generische DACH-Platzhalter für de/at/ch.
#
# Keys MÜSSEN mit StrEnum-Values aus src/aect/domain/types.py übereinstimmen
# (lowercase — Mismatch = stiller ROI=0, TOML/StrEnum-Invariante):
#   Country:           de / at / ch (+ Platzhalter-Länder nur in local.toml)
#   EmployeeCategory:  junior / professional / consultant / senior / management
#   EvidenceLevel:     pure_estimate / similar_project / tested_piloted
#   AdoptionType:      mandatory / voluntary
#
# Jede [hourly_rates.<land>]-Section MUSS alle 5 Level tragen — fehlt ein Level,
# liefert der Lookup 0 → theoretisches Potenzial 0 → stiller Vorfilter-Fail.

[thresholds]
min_potential_eur        = 20000.0
min_hours_per_year       = 120.0
min_expected_benefit_eur = 5000.0

[hourly_rates.de]
junior       = 45.0
professional = 65.0
consultant   = 78.0
senior       = 90.0
management   = 120.0

[hourly_rates.at]
junior       = 42.0
professional = 60.0
consultant   = 72.0
senior       = 85.0
management   = 110.0

[hourly_rates.ch]
junior       = 55.0
professional = 80.0
consultant   = 95.0
senior       = 110.0
management   = 145.0

[cost_tiers]
# Kostenstufen-Schwellen fuer den Composite-Score (F-006): Lizenzkosten
# unter tier_2 -> Stufe 1, unter tier_3 -> Stufe 2, sonst Stufe 3.
# Generische Platzhalter (DACH-typische SaaS-Kostenbaender) — echte Werte
# gehoeren in roi_config.local.toml.
tier_2_min_license_cost_eur = 5000.0
tier_3_min_license_cost_eur = 25000.0

[evidence_factors]
pure_estimate   = 0.50
similar_project = 0.75
tested_piloted  = 1.00

[adoption_factors]
mandatory = 1.00
voluntary = 0.60
