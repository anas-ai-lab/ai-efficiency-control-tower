# config/stack_options.toml -- GENERISCHE PLATZHALTER (AUDIT-011)
#
# Plattform-KATEGORIEN fuer den Stack-Vorschlag, ohne konkrete Produkt-/
# Vendor-Namen: die konkrete Kombination eingesetzter Produkte waere ein
# Rueckschluss auf ein reales Firmenumfeld (vertraglich bedingte IP-Trennung,
# gleiches Muster wie roi_config.toml).
#
# Echte Plattform-Namen -> config/stack_options.local.toml (gitignored).
# lookup_stack_options() bevorzugt die local-Datei, faellt sonst auf diese
# Platzhalter zurueck -- ein Fresh Clone bleibt voll funktionsfaehig.
#
[self_hosted_chat_ui]
name = "Self-hosted Open-Source-Chat-Oberflaeche"
description = "Selbst betriebene Chat-Oberflaeche fuer LLMs. Geeignet fuer interne Pilotierung ohne Lizenzkosten, erfordert eigenes Hosting."

[low_code_agent_platform]
name = "Low-Code-Plattform fuer Conversational-AI-Agenten"
description = "Low-Code-Plattform innerhalb der bestehenden Office-/Collaboration-Suite. Geeignet bei enger Anbindung an deren Datenquellen (Dokumentenablage, Messaging)."

[cloud_ai_platform]
name = "Cloud-AI-Plattform (Hyperscaler)"
description = "Cloud-Plattform fuer Modell-Hosting, Orchestrierung und Evaluation. Geeignet fuer individuelle Loesungen mit hohem Kontrollbedarf ueber Modelle, Prompts und Daten-Pipeline."

[erp_extension_platform]
name = "Erweiterungsplattform des ERP-Anbieters"
description = "Plattform fuer Erweiterungen und Integrationen im Umfeld des bestehenden ERP-Systems. Geeignet wenn die Loesung tief in bestehende ERP-Prozesse eingreift."

[andere]
name = "Andere / individuelle Loesung"
description = "Keine der Standard-Plattformen passt -- individuelle Architektur erforderlich. Signal fuer vertiefte Pruefung."
