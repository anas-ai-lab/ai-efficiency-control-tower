name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimale Berechtigungen auf Workflow-Ebene (Security Checklist)
permissions:
  contents: read

jobs:
  # ─── Job 1: Lint · Typecheck · Test ────────────────────────────────────────
  quality:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2            # SHA: Schritt 5

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies (frozen)
        run: uv sync --frozen

      - name: Lint — ruff check
        run: uv run ruff check src/ tests/

      - name: Format check — ruff format
        run: uv run ruff format --check src/ tests/

      - name: Type check — mypy
        run: uv run mypy src/

      - name: Test + Coverage — pytest
        run: uv run pytest --cov=src/aect --cov-report=term-missing -q

      # G-S4: openapi.json ist Single Source of Truth fuer die Frontend-Typen.
      # Drift-Detection: das committete Schema muss dem aktuellen entsprechen.
      - name: OpenAPI-Schema committet und aktuell
        run: |
          uv run python scripts/export_openapi.py > /tmp/openapi-current.json
          diff openapi.json /tmp/openapi-current.json || {
            echo "openapi.json ist veraltet. Lokal: uv run python scripts/export_openapi.py > openapi.json";
            exit 1;
          }

  # ─── Job 2: SAST · Dependency CVE ──────────────────────────────────────────
  security:
    name: SAST · Deps
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2            # SHA: Schritt 5

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies (frozen)
        run: uv sync --frozen

      - name: SAST — bandit (MEDIUM+)
        run: uv run bandit -r src/ -ll

      - name: Dependency CVE scan — pip-audit
        # CVE-2025-3000: torch.jit.script memory corruption (CVSS 5.3 MEDIUM,
        # transitive via sentence-transformers). NVD/Wiz weisen den Fix in
        # torch 2.10.0 aus, uv.lock haelt 2.12.0 -- die Binary ist also gepatcht.
        # ABER die von pip-audit genutzte OSV/PyPI-Advisory-DB hat KEINE Fix-
        # Version eingetragen (Spalte "Fix Versions" leer, verifiziert 2026-06-27),
        # daher flaggt pip-audit weiterhin. AECT ruft torch.jit.script nie auf ->
        # nicht exploitierbar. Ignore bleibt, bis die OSV/PyPI-Advisory die
        # Fix-Range nachtraegt; bei jedem Dependency-Update neu pruefen.
        run: uv run pip-audit --ignore-vuln CVE-2025-3000

  # ─── Job 3: Secret scan ─────────────────────────────────────────────────────
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2            # SHA: Schritt 5
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3   # SHA: Schritt 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Kein GITLEAKS_LICENSE nötig: privates Repo auf persönlichem Account

  # ─── Job 4: SBOM (CycloneDX) ────────────────────────────────────────────────
  # AUDIT-006: Software Bill of Materials. Nur auf main-Push -- der SBOM bildet
  # den freigegebenen Stand ab, nicht jeden PR. cyclonedx-py liest die installierte
  # .venv (CLI ist `cyclonedx-py environment`, NICHT `cyclonedx-bom generate`).
  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies (frozen)
        run: uv sync --frozen

      - name: Generate SBOM (CycloneDX 1.4)
        run: uv run cyclonedx-py environment --sv 1.4 -o docs/sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # SHA-pinned (AUDIT-006)
        with:
          name: sbom
          path: docs/sbom.json
          retention-days: 90

  # ─── Job 5: Frontend Quality ────────────────────────────────────────────────
  # AUDIT-004: TypeScript-Check + Next.js-Build. Node 20 (NICHT 24 -- Next.js
  # haengt dort still). Build laeuft mit Dummy-Env: SSG/statische Teile bauen
  # ohne echte API-Verbindung.
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # SHA-pinned (AUDIT-004)
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      # G-S4: api.generated.ts wird aus dem committeten openapi.json erzeugt.
      # Drift-Detection: regenerieren und gegen den committeten Stand diffen.
      - name: Frontend-Typen aus Schema generiert
        run: |
          npm run --prefix frontend generate-types:file
          git diff --exit-code frontend/src/types/api.generated.ts || {
            echo "api.generated.ts ist veraltet. Lokal: cd frontend && npm run generate-types:file";
            exit 1;
          }

      - name: TypeScript check
        run: npm run --prefix frontend typecheck

      - name: Build
        run: npm run --prefix frontend build
        env:
          AECT_API_KEY: test-key-for-ci
          AECT_API_BASE_URL: http://localhost:8000
